<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <style>
    :root { --bg: #000000; --surface: #1C1C1E; --text-primary: #FFFFFF; --text-secondary: #86868B; --accent: #FFFFFF; --green: #32D74B; }
    body { font-family: -apple-system, sans-serif; background-color: var(--bg); color: var(--text-primary); margin: 0; padding: 20px; -webkit-font-smoothing: antialiased; }
    .container { max-width: 400px; margin: 0 auto; }
    .card { background-color: var(--surface); border-radius: 18px; padding: 20px; margin-bottom: 16px; }
    .price-input { display: flex; align-items: center; background: #2C2C2E; border-radius: 12px; padding: 0 16px; margin-bottom: 12px; }
    .price-input input { background: transparent; border: none; color: white; padding: 16px 0; width: 100%; font-size: 17px; }
    button.main-btn { width: 100%; padding: 20px; background-color: white; color: black; border: none; border-radius: 100px; font-weight: 600; cursor: pointer; }
    .screen { display: none; opacity: 0; }
    .screen.active { display: block; opacity: 1; transition: opacity 0.4s ease; }
    .nota-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 10px; }
    .btn-nota { background-color: #2C2C2E; border-radius: 10px; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-weight: 600; cursor: pointer; }
    .btn-nota.selected { background-color: white; color: black; }
  </style>
</head>
<body>
<div class="container">
  <div id="step1" class="screen active">
    <h1>Como se sente?</h1>
    <div class="card">
      <label>Nível de dor/cansaço (1 a 10):</label>
      <div class="nota-grid" id="gridDorPos"></div>
    </div>
    <div class="card">
      <label>Dificuldade com o aparelho?</label>
      <input type="text" id="feedbackDificuldade" placeholder="Ex: Não, foi fácil." style="width:100%; padding:15px; border-radius:12px; border:none; background:#2C2C2E; color:white;">
    </div>
    <button class="main-btn" onclick="next(2)">Continuar</button>
  </div>

  <div id="step2" class="screen">
    <h1>Percepção de Valor</h1>
    <div class="card">
      <label>Pechincha (muito barato):</label>
      <div class="price-input"><input type="number" id="pPechincha" placeholder="0,00"></div>
      <label>Justo (preço ideal):</label>
      <div class="price-input"><input type="number" id="pBarato" placeholder="0,00"></div>
      <label>Caro (começa a pesar):</label>
      <div class="price-input"><input type="number" id="pCaro" placeholder="0,00"></div>
      <label>Absurdo (não pagaria):</label>
      <div class="price-input"><input type="number" id="pAbsurdo" placeholder="0,00"></div>
    </div>
    <button class="main-btn" onclick="next(3)">Próximo</button>
  </div>

  <div id="step3" class="screen">
    <h1>Recomendação</h1>
    <div class="card">
      <div class="nota-grid" id="gridNps1"></div>
      <div class="nota-grid" id="gridNps2"></div>
    </div>
    <button class="main-btn" onclick="enviar()">Finalizar Avaliação</button>
  </div>
</div>

<script>
  // ... (funções de criação de grid mantidas)

  function enviar() {
    const pPechincha = parseFloat(document.getElementById('pPechincha').value);
    const pBarato = parseFloat(document.getElementById('pBarato').value);
    const pCaro = parseFloat(document.getElementById('pCaro').value);
    const pAbsurdo = parseFloat(document.getElementById('pAbsurdo').value);

    // TRAVA LÓGICA DE SEGURANÇA
    if (!(pPechincha < pBarato && pBarato < pCaro && pCaro < pAbsurdo)) {
      return alert("⚠️ Erro de lógica: Os valores devem seguir a ordem crescente (Pechincha < Barato < Caro < Absurdo). Por favor, corrija.");
    }

    // ... restante da função fetch de envio
  }
</script>
</body>
</html>
