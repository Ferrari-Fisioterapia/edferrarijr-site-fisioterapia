<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <style>
    :root { --bg: #000000; --surface: #1C1C1E; --text-primary: #FFFFFF; --text-secondary: #86868B; --accent: #FFFFFF; --accent-text: #000000; --yellow: #FFD60A; --green: #32D74B; }
    body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; background-color: var(--bg); color: var(--text-primary); margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .container { width: 100%; max-width: 400px; padding: 32px 24px; box-sizing: border-box; }
    .screen { display: none; opacity: 0; transition: opacity 0.4s ease; }
    .screen.active { display: block; opacity: 1; }
    .instruction-card { background-color: var(--surface); border-radius: 16px; padding: 16px; margin-bottom: 12px; display: flex; align-items: flex-start; gap: 16px; }
    .step-badge { background-color: #333; color: white; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; flex-shrink: 0; }
    .checkbox-container { background-color: rgba(255, 214, 10, 0.08); border: 1px solid rgba(255, 214, 10, 0.2); border-radius: 16px; padding: 16px; margin-bottom: 24px; display: flex; align-items: center; cursor: pointer; }
    input[type="checkbox"] { width: 24px; height: 24px; margin-right: 16px; accent-color: var(--yellow); }
    button { width: 100%; padding: 20px; border-radius: 100px; border: none; font-weight: 600; cursor: pointer; background-color: var(--accent); color: var(--accent-text); }
    h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
    .subtitle { color: var(--text-secondary); margin-bottom: 24px; }
    .highlight-yellow { color: var(--yellow); font-weight: bold; }
    .highlight-green { color: var(--green); font-weight: bold; }
  </style>
</head>
<body>

<div class="container">
  <div id="tela3" class="screen active">
    <h1>Preparação</h1>
    <p class="subtitle">Siga os passos abaixo (Tempo total liberado: 17 min).</p>
    
    <label class="checkbox-container" id="wrapper-checkbox">
      <input type="checkbox" id="check-tomada" onchange="atualizarEstiloCheckbox(this)">
      <span style="color: var(--yellow); font-weight: 600;">Estação conectada à tomada.</span>
    </label>

    <div class="instruction-card">
      <div class="step-badge">1</div>
      <p>Vista as botas e confirme que as <b>8 câmaras</b> estão com a luz azul acesa no painel.</p>
    </div>

    <div class="instruction-card">
      <div class="step-badge">2</div>
      <p>No painel: Pressione <b>ON/OFF</b> → Selecione o <b>MODO D</b> → Ajuste a pressão.</p>
    </div>

    <div class="instruction-card">
      <div class="step-badge">3</div>
      <p>Por fim, aperte <b>PLAY</b> para iniciar o ciclo de inflagem.</p>
    </div>

    <button onclick="enviarDados()">Iniciar Recovery ⚡</button>
  </div>
</div>

<script>
  function atualizarEstiloCheckbox(checkbox) {
    const wrapper = document.getElementById('wrapper-checkbox');
    wrapper.style.borderColor = checkbox.checked ? 'var(--green)' : 'var(--yellow)';
    wrapper.style.backgroundColor = checkbox.checked ? 'rgba(50, 215, 75, 0.08)' : 'rgba(255, 214, 10, 0.08)';
  }

  function enviarDados() {
    if(!document.getElementById('check-tomada').checked) {
      return alert("⚠️ É obrigatório confirmar a conexão na tomada.");
    }
    // Lógica original de envio...
    console.log("Iniciando sessão de 17 minutos...");
  }
</script>
</body>
</html>
