<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Painel de Agendamento | Ferrari Fisioterapia</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #f2f2f7;
            background-image: 
                radial-gradient(at 0% 0%, hsla(210, 100%, 93%, 1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225, 100%, 95%, 1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(180, 100%, 93%, 1) 0, transparent 50%);
            background-attachment: fixed;
            color: #1d1d1f;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            margin: 0;
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* Overlay de Login */
        #loginOverlay {
            position: fixed; top:0; left:0; width:100%; height:100%; 
            background: rgba(242, 242, 247, 0.9); backdrop-filter: blur(10px);
            z-index: 9999; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; text-align: center;
        }

        .container {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            width: 100%;
            max-width: 600px;
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.04);
            box-sizing: border-box;
            display: none; /* Escondido até logar */
        }

        h2 { text-align: center; font-weight: 600; font-size: 24px; letter-spacing: -0.5px; margin-top: 0; margin-bottom: 30px; color: #1d1d1f; }
        label { font-weight: 500; display: block; margin-top: 20px; color: #86868b; font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; }

        input[type="text"], input[type="date"], input[type="time"], input[type="number"], input[type="email"], input[type="password"], select {
            width: 100%; padding: 14px 16px; margin-top: 8px; background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.6); border-radius: 12px; box-sizing: border-box;
            font-size: 15px; outline: none; transition: all 0.3s ease;
        }

        input:focus, select:focus { background: rgba(255, 255, 255, 0.8); border-color: #007aff; box-shadow: 0 0 0 4px rgba(0, 122, 255, 0.1); }

        .btn-novo-cliente { background: #007aff; color: #ffffff; border: none; padding: 14px 20px; border-radius: 20px; cursor: pointer; font-weight: 500; margin-top: 8px; transition: all 0.3s; white-space: nowrap; font-size: 14px; display: flex; align-items: center; gap: 6px; }
        .btn-novo-cliente.modo-cancelar { background: #ff3b30; }

        .grid-2, .grid-3 { display: flex; gap: 16px; }
        .grid-2 > div, .grid-3 > div { flex: 1; }
        
        .radio-group, .checkbox-group { display: flex; flex-direction: column; gap: 10px; margin-top: 12px; }
        .checkbox-group { display: grid; grid-template-columns: 1fr 1fr 1fr; }

        button[type="submit"], .btn-entrar {
            width: 100%; padding: 16px; background-color: #1d1d1f; color: white; border: none;
            border-radius: 14px; font-size: 16px; font-weight: 500; margin-top: 35px; cursor: pointer; transition: all 0.3s;
        }

        #painelOpcoesPacote, #painelDias, #painelNovoCliente { display: none; background: rgba(255, 255, 255, 0.4); padding: 24px; border-radius: 16px; margin-top: 20px; border: 1px solid rgba(255, 255, 255, 0.6); }
        .erro-texto { color: #ff3b30; font-size: 12px; margin-top: 8px; display: none; font-weight: 500; }

        @media (max-width: 600px) { body { padding: 15px 10px; } .container { padding: 25px 20px; } .grid-2, .grid-3 { flex-direction: column; gap: 0; } }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div style="background: white; padding: 40px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 85%; max-width: 350px;">
        <h2 style="margin-bottom: 10px;">Privado</h2>
        <p style="color: #86868b; font-size: 14px; margin-bottom: 25px;">Digite sua Chave Mestra para acessar a agenda.</p>
        <input type="password" id="passInput" placeholder="Chave Mestra">
        <button class="btn-entrar" onclick="verificarLogin()">Acessar Painel</button>
    </div>
</div>

<div class="container" id="conteudoPrincipal">
    <h2>Agenda: Ferrari Fisioterapia</h2>
    
    <form id="formAgendamento">
        <label for="pacienteSelect">Paciente / Processo</label>
        <div style="display:flex; gap:12px; align-items:center;">
            <select id="pacienteSelect" name="pacienteSelect" required>
                <option value="">Carregando pacientes...</option>
            </select>
            <button type="button" id="btnAtivarNovo" class="btn-novo-cliente" onclick="alternarNovoCliente()">Novo Cliente</button>
        </div>

        <div id="painelNovoCliente">
            <h3 style="font-size:18px; font-weight:600;">Dados de Faturamento</h3>
            <label for="novoNome">Nome / Razão Social</label>
            <input type="text" id="novoNome">
            <div class="grid-2">
                <div><label>CPF / CNPJ</label><input type="text" id="novoDoc" maxlength="18"><div id="erroDoc" class="erro-texto">Inválido</div></div>
                <div><label>WhatsApp</label><input type="text" id="novoTel"></div>
            </div>
            <label>E-mail</label><input type="email" id="novoEmail">
            <div class="grid-2">
                <div><label>CEP</label><input type="text" id="novoCep" onblur="buscarCEP()"></div>
                <div><label>Endereço</label><input type="text" id="novoRua"></div>
            </div>
        </div>

        <label for="servico">Serviço Prestado</label>
        <select id="servico" name="servico" required>
            <option value="">Selecione...</option>
            <optgroup label="Clínica e Reabilitação">
                <option value="Fisioterapia Homecare">Fisioterapia Homecare</option>
                <option value="Avaliação Fisioterapêutica">Avaliação Fisioterapêutica</option>
                <option value="Consulta Fisioterapêutica">Consulta Fisioterapêutica</option>
            </optgroup>
            <optgroup label="Perícia e Assistência Técnica">
                <option value="Parecer de Viabilidade">Parecer de Viabilidade</option>
                <option value="Quesitos">Quesitos</option>
                <option value="Impugnação + Quesitos Complementares">Impugnação + Quesitos Complementares</option>
                <option value="Avaliação Física c/ Parecer Técnico">Avaliação Física c/ Parecer Técnico</option>
                <option value="Teleconsulta c/ Parecer Simples">Teleconsulta c/ Parecer Simples</option>
            </optgroup>
            <option value="Bloqueio de Agenda">Bloqueio de Agenda</option>
        </select>

        <div class="grid-3">
            <div><label>Data</label><input type="date" id="dataInicio" required></div>
            <div><label>Início</label><input type="time" id="horario" required></div>
            <div><label>Término</label><input type="time" id="horarioFim" required></div>
        </div>

        <label for="qtdSessoes">Total de Sessões</label>
        <input type="number" id="qtdSessoes" value="1" min="1" required oninput="verificarPacote()">

        <div id="painelOpcoesPacote">
            <div class="radio-group">
                <label><input type="radio" name="tipoRecorrencia" value="automatica" checked onchange="verificarTipoRecorrencia()"> Recorrência Semanal</label>
                <label><input type="radio" name="tipoRecorrencia" value="manual" onchange="verificarTipoRecorrencia()"> Manual / Crédito</label>
            </div>
            <div id="painelDias">
                <div class="checkbox-group">
                    <label><input type="checkbox" name="dias" value="Segunda"> Seg</label>
                    <label><input type="checkbox" name="dias" value="Terça"> Ter</label>
                    <label><input type="checkbox" name="dias" value="Quarta"> Qua</label>
                    <label><input type="checkbox" name="dias" value="Quinta"> Qui</label>
                    <label><input type="checkbox" name="dias" value="Sexta"> Sex</label>
                    <label><input type="checkbox" name="dias" value="Sábado"> Sáb</label>
                </div>
            </div>
        </div>

        <button type="submit" id="btnAgendar">Confirmar Agendamento</button>
    </form>
</div>

<script>
    // URL DO SEU SCRIPT NO GOOGLE (NAO ESQUEÇA DE ATUALIZAR CASO MUDE)
    const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbwXQ1IHa2riVeGGvrCNpGzMll_htz5rPwNbeENLHcKex5mRfQgFDE9sViunwPdNBXG7/exec";
    let CHAVE_ACESSO = "";
    let modoNovoCliente = false;

    // FUNCAO DE LOGIN E CARREGAMENTO
    function verificarLogin() {
        const senha = document.getElementById('passInput').value;
        const btnLogin = document.querySelector('.btn-entrar');
        btnLogin.innerText = "Verificando...";

        fetch(`${URL_SCRIPT}?token=${senha}`)
        .then(res => res.json())
        .then(data => {
            if (Array.isArray(data) && data[0] === "Acesso Negado") {
                alert("Chave Mestra Incorreta!");
                btnLogin.innerText = "Acessar Painel";
            } else {
                CHAVE_ACESSO = senha;
                document.getElementById('loginOverlay').style.display = 'none';
                document.getElementById('conteudoPrincipal').style.display = 'block';
                
                const select = document.getElementById('pacienteSelect');
                select.innerHTML = '<option value="">Selecione na lista...</option>';
                data.forEach(nome => {
                    let opt = document.createElement('option');
                    opt.value = nome; opt.text = nome;
                    select.appendChild(opt);
                });
            }
        })
        .catch(() => {
            alert("Erro de conexão.");
            btnLogin.innerText = "Acessar Painel";
        });
    }

    // --- LÓGICA ORIGINAL PRESERVADA ---

    function alternarNovoCliente() {
        modoNovoCliente = !modoNovoCliente;
        document.getElementById('painelNovoCliente').style.display = modoNovoCliente ? 'block' : 'none';
        const select = document.getElementById('pacienteSelect');
        const btn = document.getElementById('btnAtivarNovo');
        select.disabled = modoNovoCliente;
        select.required = !modoNovoCliente;
        btn.classList.toggle('modo-cancelar', modoNovoCliente);
        btn.innerHTML = modoNovoCliente ? 'Cancelar' : 'Novo Cliente';
    }

    function verificarPacote() {
        const qtd = parseInt(document.getElementById('qtdSessoes').value) || 1;
        document.getElementById('painelOpcoesPacote').style.display = (qtd > 1) ? 'block' : 'none';
        if (qtd > 1) verificarTipoRecorrencia(); 
    }

    function verificarTipoRecorrencia() {
        const radio = document.querySelector('input[name="tipoRecorrencia"]:checked');
        document.getElementById('painelDias').style.display = (radio && radio.value === 'automatica') ? 'block' : 'none';
    }

    function buscarCEP() {
        let cep = document.getElementById('novoCep').value.replace(/\D/g, '');
        if (cep.length === 8) {
            fetch(`https://viacep.com.br/ws/${cep}/json/`)
            .then(r => r.json()).then(d => {
                if (!d.erro) {
                    document.getElementById('novoRua').value = d.logradouro;
                    document.getElementById('novoBairro').value = d.bairro;
                    document.getElementById('novoCidade').value = d.localidade + '/' + d.uf;
                }
            });
        }
    }

    document.getElementById('formAgendamento').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('btnAgendar');
        btn.innerText = "Processando..."; btn.disabled = true;

        let diasSelt = [];
        document.querySelectorAll('input[name="dias"]:checked').forEach(cb => diasSelt.push(cb.value));
        let enderecoF = modoNovoCliente ? `${document.getElementById('novoRua').value}, ${document.getElementById('novoNum').value}` : "";

        const payload = {
            token: CHAVE_ACESSO, // SEGURANÇA NO ENVIO
            isNovoCliente: modoNovoCliente,
            paciente: document.getElementById('pacienteSelect').value,
            novoNome: document.getElementById('novoNome').value,
            novoEmail: document.getElementById('novoEmail').value,
            novoTel: document.getElementById('novoTel').value,
            enderecoCompleto: enderecoF,
            servico: document.getElementById('servico').value,
            dataInicio: document.getElementById('dataInicio').value,
            horario: document.getElementById('horario').value,
            horarioFim: document.getElementById('horarioFim').value,
            qtdSessoes: document.getElementById('qtdSessoes').value,
            tipoRecorrencia: document.querySelector('input[name="tipoRecorrencia"]:checked')?.value || "",
            dias: diasSelt.join(', ')
        };

        fetch(URL_SCRIPT, { method: 'POST', body: JSON.stringify(payload) })
        .then(res => res.json())
        .then(res => {
            if (res.status === "parcial") {
                alert("AVISO DE CONFLITO: Algumas sessões foram agendadas, mas houve conflito: " + res.conflitos.join(', '));
            } else if(res.status === "erro") {
                alert("Erro: " + res.mensagem);
            } else {
                alert("Sucesso! Agendamento realizado.");
            }
            location.reload();
        })
        .catch(() => {
            alert("Erro ao enviar.");
            btn.disabled = false; btn.innerText = "Confirmar Agendamento";
        });
    });
</script>
</body>
</html>
